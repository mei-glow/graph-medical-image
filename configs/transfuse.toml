[run]
model = "transfuse"
output_dir = "outputs"

[protocol]
image_size = 256
batch_size = 16
num_workers = 4
epochs = 30
optimizer = "adam"
lr = 0.00007
loss = "transfuse_loss"
threshold = 0.5
seed = 42
train_normalize_mode = "imagenet"
eval_normalize_mode = "imagenet"
train_hflip_prob = 0.5
train_vflip_prob = 0.5
train_rotation_prob = 0.5
train_rotation_min_deg = -25.0
train_rotation_max_deg = 25.0
train_color_jitter = true
early_stopping_patience = 0
