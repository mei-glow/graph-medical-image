[run]
model = "r2attention_unet"
output_dir = "outputs"

[protocol]
image_size = 256
batch_size = 16
num_workers = 0
epochs = 150
optimizer = "adamw"
scheduler = "CosineAnnealingLR"
scheduler_t_max = 50
scheduler_eta_min = 0.00001
lr = 0.0001
loss = "bce_dice"
threshold = 0.5
seed = 42
dataset_name = "isic18"
train_normalize_mode = "imagenet"
eval_normalize_mode = "imagenet"
train_hflip_prob = 0.5
train_vflip_prob = 0.5
train_rotation_prob = 0.5
train_rotation_min_deg = 0.0
train_rotation_max_deg = 360.0
early_stopping_patience = 30
