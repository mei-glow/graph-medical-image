[run]
model = "h2former"
output_dir = "outputs"

[protocol]
image_size = 256
batch_size = 18
num_workers = 8
epochs = 90
optimizer = "adamw"
weight_decay = 0.0001
scheduler = "PolynomialLR"
scheduler_power = 0.9
lr = 0.0001
loss = "h2former_loss"
threshold = 0.5
seed = 2022
train_normalize_mode = "swin"
eval_normalize_mode = "swin"
train_hflip_prob = 0.5
train_vflip_prob = 0.5
train_rotation_prob = 0.0
early_stopping_patience = 0
pretrained_path = "semantic_attention/models/H2Former/pretrained/resnet34-b627a593.pth"
